name: openchat
description: Source-first OpenChat v1 Flutter client.
publish_to: 'none'
version: 0.2.5+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.3+1
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  markdown: ^7.2.2
  mime: ^1.0.6
  path_provider: ^2.1.4
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.0
  image: ^4.2.0
  flutter_foreground_task: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
